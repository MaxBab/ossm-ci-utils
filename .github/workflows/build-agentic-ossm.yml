name: Build and Push Agentic OSSM Container Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build multi-arch image and push to quay.io/sail-dev
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push the git tag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so all v0.* tags are visible

      - name: Calculate next version tag
        id: version
        run: |
          LATEST=$(git tag -l 'v0.*' | sort -V | tail -n1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1"
          else
            MINOR=$(echo "$LATEST" | sed 's/v0\.//')
            NEXT="v0.$((MINOR + 1))"
          fi
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push multi-arch image (versioned tag)
        run: make multiarch CONTAINER_CLI=docker TAG=${{ steps.version.outputs.version }}
        working-directory: images

      - name: Update latest tag
        run: |
          docker buildx imagetools create \
            -t quay.io/sail-dev/ossm-ai-local:latest \
            quay.io/sail-dev/ossm-ai-local:${{ steps.version.outputs.version }}

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
